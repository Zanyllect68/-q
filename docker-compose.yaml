version: '3.8'

services:
  flask-app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=itemsdb
      - DB_USER=postgres
      - DB_PASSWORD=pass123
    depends_on:
      - postgres
    volumes:
      - .:/app

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=itemsdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=pass123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: