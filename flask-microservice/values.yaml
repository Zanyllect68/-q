replicaCount: 1

image:
  repository: flask-microservice
  tag: latest
  pullPolicy: Never

service:
  type: NodePort
  port: 5000
  nodePort: 30007

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

serviceAccount:
  create: true
  annotations: {}
  name: ""

resources: {}

autoscaling:
  enabled: false

nodeSelector: {}

tolerations: []

affinity: {}